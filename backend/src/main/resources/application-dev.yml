spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:careernavigator}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:tq}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.careernavigator.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Knife4j / Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: /api/**
      packages-to-scan: com.careernavigator.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

# JWT
jwt:
  secret: CareerNavigatorAI2024SecretKeyForJWTTokenGeneration2024Secure
  expiration: 86400000

# AI Provider Config
app:
  ai:
    default-provider: ${AI_DEFAULT_PROVIDER:mimo}
    providers:
      openai:
        api-key: ${OPENAI_API_KEY:}
        base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
        model: ${OPENAI_MODEL:gpt-4o}
        enabled: false
      deepseek:
        api-key: ${DEEPSEEK_API_KEY:}
        base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}
        model: ${DEEPSEEK_MODEL:deepseek-chat}
        enabled: true
      zhipu:
        api-key: ${ZHIPU_API_KEY:}
        base-url: ${ZHIPU_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
        model: ${ZHIPU_MODEL:glm-4}
        enabled: false
      mimo:
        api-key: ${MIMO_API_KEY:tp-cjiv03k75dnf5xbpe2w27ydf2i1ogz5yfszw3tc7jeeyrpbs}
        base-url: ${MIMO_BASE_URL:https://token-plan-cn.xiaomimimo.com/v1}
        model: ${MIMO_MODEL:mimo-v2.5-pro}
        enabled: true

# Cache (Caffeine in dev)
spring.cache:
  type: caffeine
  caffeine:
    spec: maximumSize=500,expireAfterWrite=600s
